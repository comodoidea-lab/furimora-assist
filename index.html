<style>
:root {
  --primary: #FF4B4B;
  --primary-dark: #D93636;
  --bg: #F5F5F5;
  --card-bg: #FFFFFF;
  --text: #1A1A1A;
  --text-muted: #777;
  --border: #E8E8E8;
  --success: #27AE60;
  --warning: #E67E22;
  --danger: #C0392B;
  --info: #2980B9;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Hiragino Sans', 'Noto Sans JP', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  font-size: 14px;
}

/* в”Җв”Җ Header в”Җв”Җ */
.header {
  background: var(--primary);
  color: white;
  height: 54px;
  padding: 0 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.header-left { display: flex; align-items: center; gap: 10px; }
.header-logo { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
.header-sub { font-size: 11px; opacity: 0.8; margin-top: 1px; }
.header-right { display: flex; gap: 8px; }

/* в”Җв”Җ Stats bar в”Җв”Җ */
.stats-bar {
  background: white;
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex;
  gap: 24px;
  flex-wrap: wrap;
  align-items: center;
}
.stat { display: flex; flex-direction: column; align-items: center; gap: 1px; }
.stat-val { font-size: 22px; font-weight: 800; line-height: 1; }
.stat-val.ok { color: var(--text); }
.stat-val.warn { color: var(--warning); }
.stat-val.danger { color: var(--danger); }
.stat-lbl { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.4px; }
.stats-divider { width: 1px; height: 32px; background: var(--border); }

/* в”Җв”Җ Toolbar в”Җв”Җ */
.toolbar {
  padding: 12px 20px;
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
  background: white;
  border-bottom: 1px solid var(--border);
}
.search-input {
  flex: 1;
  min-width: 180px;
  padding: 7px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--primary); }
select.filter {
  padding: 7px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  background: white;
  cursor: pointer;
  outline: none;
  color: var(--text);
}

/* в”Җв”Җ Buttons в”Җв”Җ */
.btn {
  padding: 7px 14px;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 5px;
  transition: opacity 0.15s, transform 0.1s;
  white-space: nowrap;
}
.btn:active { transform: scale(0.97); }
.btn-primary { background: var(--primary); color: white; }
.btn-primary:hover { background: var(--primary-dark); }
.btn-ghost { background: #F0F0F0; color: var(--text); }
.btn-ghost:hover { background: #E4E4E4; }
.btn-success { background: var(--success); color: white; }
.btn-warning { background: var(--warning); color: white; }
.btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 6px; }
.btn-xs { padding: 3px 8px; font-size: 11px; border-radius: 5px; }

/* в”Җв”Җ Grid в”Җв”Җ */
.items-wrap { padding: 16px 20px; }
.items-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
  gap: 14px;
}

/* в”Җв”Җ Card в”Җв”Җ */
.card {
  background: white;
  border-radius: 12px;
  border: 1px solid var(--border);
  overflow: hidden;
  transition: box-shadow 0.2s, transform 0.15s;
}
.card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.1); transform: translateY(-2px); }
.card.stale-30 { border-left: 4px solid var(--warning); }
.card.stale-60 { border-left: 4px solid var(--danger); }
.card.sold { opacity: 0.55; }

.card-thumb {
  width: 100%;
  height: 130px;
  object-fit: cover;
  display: block;
  background: #EEE;
}
.card-thumb-placeholder {
  width: 100%;
  height: 130px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  background: linear-gradient(135deg,#F5F5F5,#E8E8E8);
  color: #CCC;
}
.card-body { padding: 12px 14px; }
.card-title {
  font-size: 13px;
  font-weight: 700;
  line-height: 1.45;
  margin-bottom: 8px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-row { display: flex; align-items: center; gap: 6px; margin-bottom: 6px; }
.card-price { font-size: 20px; font-weight: 800; color: var(--primary); }
.card-orig-price { font-size: 11px; color: var(--text-muted); text-decoration: line-through; }
.card-price-drop {
  font-size: 11px;
  background: #FFF0F0;
  color: var(--primary);
  padding: 1px 6px;
  border-radius: 4px;
  font-weight: 600;
}
.days-badge {
  margin-left: auto;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
  font-weight: 600;
  background: #F0F0F0;
  color: var(--text-muted);
}
.days-badge.warn { background: #FFF3E0; color: var(--warning); }
.days-badge.danger { background: #FFEBEE; color: var(--danger); }

.card-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 10px; }
.tag {
  font-size: 10px;
  padding: 2px 7px;
  border-radius: 4px;
  font-weight: 600;
  max-width: 130px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}


}
.tag-cat { background: #EEF2FF; color: #4338CA; }
.tag-cond { background: #F0FDF4; color: #166534; }
.tag-relist { background: #FFF7ED; color: #C2410C; }
.tag-sold { background: #F0F0F0; color: #666; }

.card-actions {
  display: flex;
  gap: 6px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}

/* в”Җв”Җ Modal в”Җв”Җ */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
}
.overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: white;
  border-radius: 16px;
  width: 100%;
  max-width: 600px;
  max-height: 92vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.35);
  transform: translateY(12px) scale(0.98);
  transition: transform 0.2s;
}
.overlay.open .modal { transform: none; }
.modal-hd {
  padding: 18px 22px 14px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  background: white;
  z-index: 1;
}
.modal-title { font-size: 16px; font-weight: 800; }
.modal-close {
  width: 30px; height: 30px;
  border: none;
  background: #F0F0F0;
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--text-muted);
  transition: background 0.15s;
}
.modal-close:hover { background: #DDD; }
.modal-body { padding: 20px 22px; }
.modal-ft {
  padding: 14px 22px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 8px;
  justify-content: flex-end;
}

/* в”Җв”Җ Copy field в”Җв”Җ */
.copy-field { margin-bottom: 14px; }
.copy-lbl {
  font-size: 11px;
  font-weight: 700;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 5px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.copy-row { display: flex; gap: 8px; align-items: flex-start; }
.copy-text {
  flex: 1;
  padding: 8px 11px;
  background: #F7F7F7;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.5;
  white-space: pre-wrap;
  word-break: break-word;
  max-height: 130px;
  overflow-y: auto;
  font-family: inherit;
}
.copy-btn {
  padding: 7px 12px;
  background: var(--primary);
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.2s;
}
.copy-btn:hover { background: var(--primary-dark); }
.copy-btn.done { background: var(--success); }

/* в”Җв”Җ Price calc в”Җв”Җ */
.price-calc-box {
  background: #FFF5F5;
  border: 1px solid #FFD5D5;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
  text-align: center;
}
.price-current { font-size: 13px; color: var(--text-muted); margin-bottom: 4px; }
.price-new-display { font-size: 36px; font-weight: 900; color: var(--primary); margin-bottom: 12px; }
.price-presets { display: flex; gap: 6px; justify-content: center; flex-wrap: wrap; margin-bottom: 12px; }
.preset-btn {
  padding: 5px 12px;
  border: 2px solid var(--border);
  border-radius: 6px;
  background: white;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.15s;
}
.preset-btn:hover, .preset-btn.active { border-color: var(--primary); color: var(--primary); background: #FFF0F0; }
.price-custom-row { display: flex; gap: 8px; align-items: center; justify-content: center; margin-bottom: 10px; }
.price-input {
  width: 100px;
  padding: 7px 10px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 14px;
  text-align: center;
  outline: none;
}
.price-input:focus { border-color: var(--primary); }
.price-type-toggle { display: flex; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.type-btn {
  padding: 7px 14px;
  border: none;
  background: white;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text-muted);
}
.type-btn.active { background: var(--primary); color: white; }

/* в”Җв”Җ Price history в”Җв”Җ */
.ph-title { font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
.ph-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 0;
  border-bottom: 1px solid var(--border);
  font-size: 12px;
}
.ph-item:last-child { border-bottom: none; }
.ph-price { font-weight: 700; color: var(--text); min-width: 70px; }
.ph-note { color: var(--text-muted); flex: 1; }
.ph-date { color: var(--text-muted); font-size: 11px; }

/* в”Җв”Җ Import area в”Җв”Җ */
.import-area {
  width: 100%;
  min-height: 110px;
  padding: 10px;
  border: 2px dashed var(--border);
  border-radius: 8px;
  font-size: 12px;
  font-family: monospace;
  resize: vertical;
  outline: none;
  transition: border-color 0.2s;
  background: #FAFAFA;
}
.import-area:focus { border-color: var(--primary); }

/* в”Җв”Җ Bookmarklet в”Җв”Җ */
.bm-steps { counter-reset: step; }
.bm-step { display: flex; gap: 12px; margin-bottom: 18px; align-items: flex-start; }
.bm-num {
  width: 26px; height: 26px;
  background: var(--primary);
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  font-weight: 800;
  flex-shrink: 0;
}
.bm-content { flex: 1; }
.bm-content p { font-size: 13px; line-height: 1.6; }
.bm-link {
  display: inline-block;
  margin-top: 8px;
  padding: 10px 18px;
  background: #FFF3F3;
  border: 2px solid var(--primary);
  border-radius: 8px;
  color: var(--primary);
  font-weight: 800;
  font-size: 14px;
  text-decoration: none;
  cursor: grab;
}
.bm-link:active { cursor: grabbing; }
.bm-tip {
  background: #FFF8E1;
  border: 1px solid #FFE082;
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px;
  color: #5D4037;
  margin-top: 14px;
  line-height: 1.6;
}

/* в”Җв”Җ Empty state в”Җв”Җ */
.empty {
  grid-column: 1 / -1;
  text-align: center;
  padding: 64px 20px;
  color: var(--text-muted);
}
.empty-icon { font-size: 52px; margin-bottom: 16px; }
.empty-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 8px; }
.empty-desc { font-size: 13px; line-height: 1.7; }

/* в”Җв”Җ Toast в”Җв”Җ */
.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: #1A1A1A;
  color: white;
  padding: 11px 18px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  z-index: 9999;
  opacity: 0;
  transform: translateY(8px);
  transition: all 0.2s;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateY(0); }

/* в”Җв”Җ Tab filter в”Җв”Җ */
.tab-bar {
  padding: 0 20px;
  background: white;
  border-bottom: 1px solid var(--border);
  display: flex;
  gap: 0;
}
.tab-btn {
  padding: 10px 16px;
  border: none;
  border-bottom: 3px solid transparent;
  background: none;
  font-size: 13px;
  font-weight: 600;
  cursor: pointer;
  color: var(--text-muted);
  margin-bottom: -1px;
  transition: color 0.15s;
}
.tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }

/* в”Җв”Җ Section heading в”Җв”Җ */
.section-info {
  padding: 8px 20px;
  font-size: 12px;
  color: var(--text-muted);
  border-bottom: 1px solid var(--border);
  background: white;
}

/* note input */
.note-input {
  width: 100%;
  padding: 8px 11px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  resize: vertical;
  min-height: 56px;
  font-family: inherit;
  outline: none;
}
.note-input:focus { border-color: var(--primary); }
.form-group { margin-bottom: 14px; }
.form-label { font-size: 12px; font-weight: 700; color: var(--text-muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
.form-input {
  width: 100%;
  padding: 8px 11px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 13px;
  outline: none;
  font-family: inherit;
}
.form-input:focus { border-color: var(--primary); }
hr.divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

/* image gallery in relist modal */
.img-gallery { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
.img-gallery a { display: block; }
.img-gallery img { width: 64px; height: 64px; object-fit: cover; border-radius: 6px; border: 1px solid var(--border); }

@media (max-width: 560px) {
  .items-grid { grid-template-columns: 1fr; }
  .stats-bar { gap: 12px; }
  .toolbar { padding: 10px; gap: 6px; }
  .header-logo { font-size: 16px; }
}

/* в”Җв”Җ New Listing Assistant в”Җв”Җ */
.schedule-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
  margin-top: 8px;
}
.schedule-table th {
  background: #F5F5F5;
  padding: 7px 10px;
  text-align: left;
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.3px;
  border-bottom: 2px solid var(--border);
}
.schedule-table td {
  padding: 7px 10px;
  border-bottom: 1px solid var(--border);
}
.schedule-table tr:last-child td { border-bottom: none; }
.schedule-table tr.sched-start td { background: #F0FDF4; }
.schedule-table tr.sched-min td { background: #FFF0F0; }
.sched-price { font-weight: 700; color: var(--primary); }
.profit-box {
  background: #F0FDF4;
  border: 1px solid #BBF7D0;
  border-radius: 10px;
  padding: 12px 14px;
  margin-top: 10px;
}
.profit-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  margin-bottom: 6px;
}
.profit-row:last-child { margin-bottom: 0; }
.profit-lbl { color: var(--text-muted); }
.profit-val { font-weight: 700; }
.profit-val.pos { color: var(--success); }
.profit-val.neg { color: var(--danger); }
.nl-section-title {
  font-size: 14px;
  font-weight: 800;
  margin-bottom: 12px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.ai-btn {
  background: linear-gradient(135deg, #4285F4, #0F9D58);
  color: white;
  border: none;
  border-radius: 8px;
  padding: 9px 18px;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: 6px;
  transition: opacity 0.15s;
}
.ai-btn:hover { opacity: 0.88; }
.ai-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.ai-spinner {
  width: 13px; height: 13px;
  border: 2px solid rgba(255,255,255,0.35);
  border-top-color: white;
  border-radius: 50%;
  display: inline-block;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* в•җв•җ Dark mode в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
body.dark {
  --bg: #111827; --card-bg: #1F2937; --text: #F3F4F6;
  --text-muted: #9CA3AF; --border: #374151;
  --success: #34D399; --warning: #FBBF24; --danger: #F87171; --info: #60A5FA;
}
body.dark .header { background: #1a2744; }
body.dark .stats-bar,body.dark .tab-bar { background: #1F2937; border-bottom-color: #374151; }
body.dark .toolbar,body.dark .section-info { background: #111827; border-bottom-color: #374151; }
body.dark .card { background: var(--card-bg); border-color: var(--border); }
body.dark .card:hover { box-shadow: 0 4px 18px rgba(0,0,0,0.5); }
body.dark .card-thumb-placeholder { background: linear-gradient(135deg,#1F2937,#374151); color: #6B7280; }
body.dark .modal { background: var(--card-bg); color: var(--text); }
body.dark .modal-hd,body.dark .modal-ft { background: #253048; border-color: var(--border); }
body.dark .form-input,body.dark .note-input,body.dark .import-area,
body.dark .search-input,body.dark .filter,body.dark .copy-field,body.dark .copy-text
  { background: #111827; color: var(--text); border-color: var(--border); }
body.dark .form-label,body.dark .stat-lbl { color: var(--text-muted); }
body.dark .schedule-table th { background: #253048; color: var(--text-muted); border-bottom-color: var(--border); }
body.dark .schedule-table td { border-bottom-color: var(--border); }
body.dark .schedule-table tr.sched-start td { background: rgba(20,83,45,0.4); }
body.dark .schedule-table tr.sched-min td { background: rgba(127,29,29,0.4); }
body.dark .profit-box { background: rgba(20,83,45,0.3); border-color: #166534; }
body.dark .tab-btn { color: var(--text-muted); }
body.dark .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
body.dark .days-badge { background: #374151; color: var(--text-muted); }
body.dark .days-badge.warn { background: rgba(251,191,36,0.15); color: var(--warning); }
body.dark .days-badge.danger { background: rgba(248,113,113,0.15); color: var(--danger); }
body.dark .preset-btn { background: #374151; color: var(--text); border-color: var(--border); }
body.dark .preset-btn.active { background: var(--primary); color: white; }
body.dark .nl-template-preview { background: #253048; color: var(--text-muted); }
body.dark .card-menu { background: var(--card-bg); border-color: var(--border); }
body.dark .divider { border-color: var(--border); }

/* btn-ghost: е…ЁдҪ“пјҲгғ„гғјгғ«гғҗгғјгғ»гғўгғјгғҖгғ«еҶ…пјү */
body.dark .btn-ghost {
  background: #2D3748;
  color: #E2E8F0;
}
body.dark .btn-ghost:hover { background: #3D4A5C; }

/* btn-ghost: гғҳгғғгғҖгғјеҶ…пјҲжҝғгҒ„иғҢжҷҜгҒ®дёҠпјү */
body.dark .header .btn-ghost {
  background: rgba(255,255,255,0.12);
  color: white;
}
body.dark .header .btn-ghost:hover { background: rgba(255,255,255,0.22); }

/* гғўгғјгғҖгғ«й–үгҒҳгӮӢгғңгӮҝгғі */
body.dark .modal-close { color: var(--text-muted); }
body.dark .modal-close:hover { background: #374151; color: var(--text); }

/* гғҶгӮӯгӮ№гғҲгӮЁгғӘгӮў */
body.dark textarea { background: #111827; color: var(--text); border-color: var(--border); }

/* гӮҝгӮ° */
body.dark .tag { background: #2D3748; color: #CBD5E0; }
body.dark .tag-cat { background: #1E3A5F; color: #93C5FD; }
body.dark .tag-cond { background: #2D3748; color: #CBD5E0; }
body.dark .tag-sold { background: rgba(127,29,29,0.4); color: #FCA5A5; }
body.dark .tag-relist { background: rgba(20,83,45,0.4); color: #86EFAC; }

/* гӮ«гғјгғүгӮҝгӮӨгғҲгғ«гғ»дҫЎж ј */
body.dark .card-title { color: var(--text); }
body.dark .card-price { color: var(--primary) !important; }
body.dark .card-orig-price { color: var(--text-muted); }

/* гӮ»гӮҜгӮ·гғ§гғігӮҝгӮӨгғҲгғ«гғ»еҗ„гғ©гғҷгғ« */
body.dark .nl-section-title { color: var(--text); border-bottom-color: var(--border); }
body.dark .stat-lbl { color: var(--text-muted); }
body.dark .stats-divider { background: var(--border); }

/* гғўгғјгғҖгғ«жң¬ж–ҮгғҶгӮӯгӮ№гғҲ */
body.dark .modal-body p,
body.dark .modal-body label,
body.dark .modal-body small { color: var(--text-muted); }

/* гӮ№гӮұгӮёгғҘгғјгғ«гғ’гғігғҲ */

/* жӨңзҙўгғҗгғј гғ—гғ¬гғјгӮ№гғӣгғ«гғҖгғј */
body.dark .search-input::placeholder { color: #6B7280; }
body.dark .form-input::placeholder,
body.dark .note-input::placeholder,
body.dark textarea::placeholder { color: #6B7280; }

/* з©әгҒ®зҠ¶ж…ӢгғҶгӮӯгӮ№гғҲ */
body.dark .empty-title { color: var(--text); }
body.dark .empty-desc { color: var(--text-muted); }

/* в•җв•җ List view в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
.items-list { display: flex; flex-direction: column; gap: 6px; }
.items-list .card { display: grid; grid-template-columns: 76px 1fr; border-radius: 10px; }
.items-list .card:hover { transform: none; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.items-list .card-thumb,
.items-list .card-thumb-placeholder { width: 76px; height: 76px; border-radius: 10px 0 0 10px; }
.items-list .card-body { padding: 8px 12px; display: flex; align-items: center; gap: 10px; }
.items-list .card-title { flex: 1; -webkit-line-clamp: 1; margin-bottom: 0; min-width: 0; }
.items-list .card-row,.items-list .card-tags { margin-bottom: 0; }
.view-active { background: rgba(255,75,75,0.12) !important; color: var(--primary) !important; }
body.dark .view-active { background: rgba(255,75,75,0.22) !important; }

/* в•җв•җ Responsive / Mobile в•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җв•җ */
@media (max-width: 768px) {
  .header { height: auto; padding: 8px 12px; flex-wrap: wrap; gap: 6px; }
  .header-right { gap: 3px; flex-wrap: wrap; }
  .header-right .btn-sm { padding: 5px 7px; font-size: 11px; }
  .header-logo { font-size: 16px; }
  .header-sub { font-size: 10px; }
  .stats-bar { padding: 8px 12px; gap: 10px; }
  .stat-val { font-size: 20px; }
  .tab-bar { gap: 0; padding: 0 6px; overflow-x: auto; }
  .tab-btn { padding: 10px 8px; font-size: 12px; white-space: nowrap; }
  .toolbar { padding: 8px 12px; flex-wrap: wrap; gap: 6px; }
  .search-input { min-width: 0; flex: 1; }
  .items-wrap { padding: 10px; }
  .items-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 8px; }
  .card-thumb,.card-thumb-placeholder { height: 100px; }
  .overlay { padding: 8px; align-items: flex-end; }
  .modal { width: 100%; max-height: 92vh; border-radius: 16px 16px 0 0; }
  .modal-body { max-height: calc(92vh - 130px); overflow-y: auto; }
  .card-actions { flex-wrap: wrap; gap: 4px; }
  .btn-primary.btn-sm,.btn-warning.btn-sm { flex: 1; justify-content: center; }
}
@media (max-width: 480px) {
  .items-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  .card-thumb,.card-thumb-placeholder { height: 90px; }
  .stat-val { font-size: 18px; }
  .header-sub { display: none; }
}
</style>
