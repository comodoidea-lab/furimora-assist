<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>フリモーラ アシスト</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 320px;
    font-family: 'Noto Sans JP', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f9f9f9;
    color: #1a1c1c;
  }
  .header {
    background: linear-gradient(135deg, #bb0017 0%, #ea0020 100%);
    color: white;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-icon {
    width: 32px; height: 32px;
    background: rgba(255,255,255,0.2);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px;
  }
  .header h1 { font-size: 15px; font-weight: 900; }
  .header p { font-size: 10px; opacity: 0.8; }

  .section { padding: 14px 16px; }
  .section + .section { border-top: 1px solid #eeeeee; }

  .section-title {
    font-size: 10px; font-weight: 700;
    color: #5f3e3b; text-transform: uppercase;
    letter-spacing: 0.08em; margin-bottom: 10px;
  }

  .stat-row {
    display: flex; gap: 8px; margin-bottom: 10px;
  }
  .stat-card {
    flex: 1; background: white; border-radius: 10px;
    padding: 10px 12px; text-align: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .stat-val { font-size: 22px; font-weight: 900; color: #bb0017; }
  .stat-lbl { font-size: 9px; color: #5f3e3b; margin-top: 2px; }

  .btn {
    width: 100%; padding: 11px 14px;
    border-radius: 99px; font-size: 13px; font-weight: 700;
    cursor: pointer; border: none; display: flex;
    align-items: center; justify-content: center;
    gap: 8px; transition: opacity 0.15s, transform 0.15s;
    margin-bottom: 8px;
  }
  .btn:hover { opacity: 0.9; }
  .btn:active { transform: scale(0.98); }
  .btn:last-child { margin-bottom: 0; }

  .btn-primary {
    background: linear-gradient(135deg, #bb0017 0%, #ea0020 100%);
    color: white;
    box-shadow: 0 3px 10px rgba(187,0,23,0.25);
  }
  .btn-secondary { background: #eeeeee; color: #1a1c1c; }

  .current-page {
    background: white; border-radius: 10px; padding: 10px 12px;
    font-size: 11px; color: #5f3e3b; margin-bottom: 10px;
    display: flex; align-items: center; gap: 6px;
  }
  .current-page.mercari { color: #bb0017; font-weight: 700; }

  .footer {
    padding: 10px 16px;
    border-top: 1px solid #eeeeee;
    font-size: 10px; color: #956d6a; text-align: center;
  }
</style>
</head>
<body>
<div class="header">
  <div class="header-icon">📦</div>
  <div>
    <h1>フリモーラ アシスト</h1>
    <p>出品自動化ツール</p>
  </div>
</div>

<div class="section">
  <div class="section-title">本日のサマリー</div>
  <div class="stat-row">
    <div class="stat-card">
      <div class="stat-val" id="stat-total">—</div>
      <div class="stat-lbl">総出品数</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-relist">—</div>
      <div class="stat-lbl">再出品待ち</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="stat-discount">—</div>
      <div class="stat-lbl">今日の値下げ</div>
    </div>
  </div>

  <div class="current-page" id="page-status">
    <span>📄</span> <span id="page-status-text">読み込み中...</span>
  </div>
</div>

<div class="section">
  <div class="section-title">クイックアクション</div>
  <button class="btn btn-primary" id="btn-open-app">
    <span>🚀</span> アプリを開く
  </button>
  <button class="btn btn-secondary" id="btn-clone">
    <span>📋</span> このページをクローン
  </button>
  <button class="btn btn-secondary" id="btn-relist">
    <span>🔄</span> 再出品管理を開く
  </button>
</div>

<div class="footer">
  フリモーラ v1.0.0 | メルカリページで追加機能が利用できます
</div>

<script src="popup.js"></script>
</body>
</html>
